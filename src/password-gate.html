<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>EndoTech Singapore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }

    .logo {
      margin-bottom: 2rem;
    }

    .logo svg {
      width: 60px;
      height: 60px;
      fill: #22d3ee;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }

    p {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.875rem;
    }

    .form-group {
      position: relative;
    }

    input {
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1rem;
      border: 2px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      color: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #22d3ee;
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: #22d3ee;
      color: #0f172a;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #06b6d4;
    }

    button:active {
      transform: scale(0.98);
    }

    .error {
      color: #f87171;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm2 14h-4v-1h4v1zm0-2h-4v-1h4v1zm-1-3.08V13h-2v-2.08c-1.38-.47-2.26-1.72-2.26-3.17C8.74 6.23 10.07 5 11.75 5c1.68 0 3.01 1.23 3.01 2.75 0 1.45-.88 2.7-2.26 3.17z"/>
      </svg>
    </div>
    <h1>EndoTech Singapore</h1>
    <p>This site is password protected.</p>

    <form id="passwordForm">
      <div class="form-group">
        <input
          type="password"
          id="password"
          placeholder="Enter password"
          autocomplete="off"
          autofocus
        >
      </div>
      <button type="submit">Enter</button>
      <p class="error" id="error">Incorrect password. Please try again.</p>
    </form>
  </div>

  <script>
    const SECRET_PATH = '/50344740e79c4934ebc490ee8ab5dc08/';
    const CORRECT_PASSWORD = 'Endotech';

    document.getElementById('passwordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');

      if (password === CORRECT_PASSWORD) {
        // Store auth in sessionStorage so refreshes within session work
        sessionStorage.setItem('endotech_auth', 'true');
        window.location.href = SECRET_PATH;
      } else {
        error.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });

    // Hide error when typing
    document.getElementById('password').addEventListener('input', function() {
      document.getElementById('error').classList.remove('show');
    });
  </script>
</body>
</html>
